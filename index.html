<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gacha Countdown Hub</title>
<style>
body{
  margin:0;
  background:#111;
  color:#eee;
  font-family:system-ui,sans-serif;
}
h1{
  text-align:center;
  padding:12px;
  margin:0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:10px;
  padding:10px;
}
.card{
  background:#1d1d1d;
  border-radius:10px;
  overflow:hidden;
}
.title{
  padding:10px;
  font-weight:bold;
}
iframe{
  width:100%;
  height:700px;
  border:none;
  background:white;
}
.note{
  text-align:center;
  opacity:.8;
  padding:8px;
}
</style>
</head>
<body>
<h1>Gacha Countdown Hub</h1>
<div class="note">
If a site blocks embedding (X-Frame-Options/CSP), click its title to open it directly.
</div>

<div class="grid">
  <div class="card">
    <div class="title"><a href="https://endfield-countdown.gengamer.in/" target="_blank">Arknights Endfield</a></div>
    <iframe src="https://endfield-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://hsr-countdown.gengamer.in/" target="_blank">Honkai: Star Rail</a></div>
    <iframe src="https://hsr-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://nte-countdown.gengamer.in/" target="_blank">Neverness to Everness</a></div>
    <iframe src="https://nte-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://nte-countdown.gengamer.in/" target="_blank">Zenless Zone Zero</a></div>
    <iframe src="https://zenless-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://nte-countdown.gengamer.in/" target="_blank">Wuthering Waves</a></div>
    <iframe src="https://wuthering-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://nte-countdown.gengamer.in/" target="_blank">Genshin Impact</a></div>
    <iframe src="https://genshin-countdown.gengamer.in/"></iframe>
  </div>

  <div class="card">
    <div class="title"><a href="https://lcbcountdown.carrd.co/" target="_blank">Limbus Company</a></div>
    <iframe src="https://lcbcountdown.carrd.co/"></iframe>
  </div>
</div>
</body>
</html>
